apis:
  - aid: opslevel:graphql-api
    name: OpsLevel GraphQL API
    description: >-
      The OpsLevel GraphQL API allows you to integrate OpsLevel with your other
      operational tools, enrich internal tickets, incidents, and other systems
      with service and team data pulled from OpsLevel. The API supports queries
      for data retrieval and mutations for data modification, with cursor-based
      pagination, bearer token authentication, and a rich data model covering
      services, teams, users, deployments, and infrastructure.
    humanURL: https://docs.opslevel.com/docs/graphql
    baseURL: https://api.opslevel.com
